# Pipeline-wide settings. Config over code (CLAUDE.md's fork-friendly
# design goal) -- tune these values here rather than editing scrapers.
# Ministry source declarations (CLAUDE.md stage 2) will live here too once
# the adapter interface exists.

hrw:
  feed_url: "https://www.hrw.org/rss/news"
  # How long a cached feed/article fetch is considered fresh before
  # scrapers/http.py's fetch_raw_cached() re-fetches it. The feed TTL is
  # short relative to the article TTL because scrapers/hrw.py fetches one
  # un-paginated feed response per run with no backfill crawl -- a
  # shorter feed TTL is the main lever that shrinks the window in which
  # HRW could publish and then roll an item out of the feed between two
  # crawls. See DECISIONS.md, "Redesign HRW crawl reliability".
  feed_cache_ttl_hours: 4
  article_cache_ttl_hours: 168
