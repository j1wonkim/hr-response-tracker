# Pipeline-wide settings. Config over code (CLAUDE.md's fork-friendly
# design goal) -- tune these values here rather than editing scrapers.

# Only ingest events published on or after this date (YYYY-MM-DD). This
# bounds the *initial backfill* only: events already ingested are never
# dropped as they age past this date, and this value should not be moved
# forward over time to "expire" old data. See DECISIONS.md, "Bound
# initial HRW ingestion with a config-driven ingest_start_date".
ingest_start_date: "2026-01-01"
